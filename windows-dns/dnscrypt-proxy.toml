## dnscrypt-proxy.toml -- Windows
## Mirrors the NixOS workstation DNS setup
## Reference: https://github.com/DNSCrypt/dnscrypt-proxy/blob/master/dnscrypt-proxy/example-dnscrypt-proxy.toml

########## Top-level settings (must come before any [section] headers) ##########

listen_addresses = ['127.0.0.1:53', '[::1]:53']

ipv6_servers = true
require_dnssec = true

server_names = ['cloudflare']

## Uncomment to log all queries for debugging
# log_file = 'C:\Program Files\dnscrypt-proxy\dnscrypt-proxy.log'

cloaking_rules = 'C:\Program Files\dnscrypt-proxy\cloaking-rules.txt'


########## Sources ##########

[sources.public-resolvers]
urls = [
  'https://raw.githubusercontent.com/DNSCrypt/dnscrypt-resolvers/master/v3/public-resolvers.md',
  'https://download.dnscrypt.info/resolvers-list/v3/public-resolvers.md',
]
cache_file = 'C:\Program Files\dnscrypt-proxy\public-resolvers.md'
minisign_key = 'RWQf6LRCGA9i53mlYecO4IzT51TGPpvWucNSCh1CBM0QTaLn73Y7GFO3'


########## Filtering ##########

[blocked_names]
blocked_names_file = 'C:\Program Files\dnscrypt-proxy\blocked-names.txt'

[allowed_names]
allowed_names_file = 'C:\Program Files\dnscrypt-proxy\allowed-names.txt'


########## Schedules ##########

[schedules.go-home]
mon = [{ after = '17:30', before = '4:30' }]
tue = [{ after = '17:30', before = '4:30' }]
wed = [{ after = '17:30', before = '4:30' }]
thu = [{ after = '17:30', before = '4:30' }]
fri = [{ after = '17:30', before = '4:30' }]
sat = [{ after = '17:30', before = '4:30' }]
sun = [{ after = '17:30', before = '4:30' }]

[schedules.not-social-networks]
mon = [{ after = '4:30', before = '16:00' }]
tue = [{ after = '4:30', before = '16:00' }]
wed = [{ after = '4:30', before = '16:00' }]
thu = [{ after = '4:30', before = '16:00' }]
fri = [{ after = '4:30', before = '16:00' }]
sat = [{ after = '4:30', before = '16:00' }]
sun = [{ after = '4:30', before = '16:00' }]
